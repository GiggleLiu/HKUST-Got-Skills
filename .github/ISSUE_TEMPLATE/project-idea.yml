name: Project Idea
description: Submit a hackathon project idea
labels: ["project-idea"]
body:
  - type: markdown
    attributes:
      value: |
        ## Need Inspiration?

        Think about what repetitive or time-consuming process in your research could an AI skill handle for you. Here are some directions:

        - **Experiment automation** — automate data collection, parameter sweeps, or result analysis
        - **Coding and testing** — generate, test, and debug scientific code
        - **Paper writing** — drafting, notation checking, citation management
        - **Literature survey** — searching, summarizing, and organizing papers
        - **Education** — creating tutorials, exercises, or explanations
        - **Brainstorming** — exploring new research directions with AI-assisted ideation
  - type: input
    id: title
    attributes:
      label: Project Title
      description: A short, descriptive name for your skill
      placeholder: "e.g., Automated Literature Review Skill"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this skill do? What scientific workflow does it improve?
      placeholder: "Describe the skill and the scientific workflow it improves..."
    validations:
      required: true
  - type: dropdown
    id: target-tool
    attributes:
      label: Target Tool
      description: Which AI coding tool will this skill be built for?
      options:
        - Claude Code
        - Cursor
        - Codex CLI
        - OpenCode
        - Any / Tool-agnostic
    validations:
      required: true
